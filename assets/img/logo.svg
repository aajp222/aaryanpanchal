<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aaryan Panchal logo">
  <!--
    Recreation of Aaryan's handwritten monogram.
    Drawn in `currentColor` so it adapts to the active theme.
    Replace this file with your exact logo export and it will flow through
    the nav, preloader and favicon automatically.
  -->
  <g fill="none" stroke="currentColor" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- looped body -->
    <path d="M59 47 C 41 38, 26 53, 30 70 C 33 85, 56 89, 60 72 C 62 62, 60 53, 59 47 Z"/>
    <!-- descender tail -->
    <path d="M41 75 C 39 87, 41 96, 47 99"/>
    <!-- rising stroke / tick -->
    <path d="M56 61 C 73 53, 85 36, 93 17"/>
  </g>
</svg>
